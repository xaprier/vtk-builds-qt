name: build and upload VTK

on:
  workflow_call:
    inputs:
      version_major:
        description: 'Which VTK version (major) are we considering'
        required: true
        type: string
      version_minor:
        description: 'Which VTK version (minor) are we considering'
        required: true
        type: string
      version_patch:
        description: 'Which VTK version (patch) are we considering'
        required: true
        type: string
      shared:
        description: 'Whether shared or static libraries shall be built'
        required: true
        type: boolean
      threads:
        description: 'Number of compilation threads'
        required: false
        type: number
        default: 4

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  CMAKE_OPTIONS: -DVTK_BUILD_EXAMPLES=OFF -DVTK_BUILD_TESTING=OFF -DCMAKE_VERBOSE_MAKEFILE=ON -DVTK_GROUP_ENABLE_Qt=YES -DVTK_GROUP_ENABLE_VTK_GUISupportQt=YES -DVTK_GROUP_ENABLE_VTK_GUISupportQtQuick=YES -DVTK_GROUP_ENABLE_VTK_ViewsQt=YES
  BUILD_TYPE: Release
  QT_VERSION: 6.10.1

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v6

    - name: Determine release name
      uses: haya14busa/action-cond@v1
      id: release-name
      with:
        cond: ${{ inputs.shared }}
        if_true: VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}-shared
        if_false: VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}-static

    - uses: dev-drprasad/delete-tag-and-release@v1.1
      with:
        delete_release: true
        tag_name: ${{ steps.release-name.outputs.value }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - uses: rickstaa/action-create-tag@v1
      id: create_tag
      with:
        tag: ${{ steps.release-name.outputs.value }}
        message: ${{ steps.release-name.outputs.value }}
        force_push_tag: true

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.release-name.outputs.value }}
        release_name: ${{ steps.release-name.outputs.value }}
        draft: false
        prerelease: false

  build_windows:
    runs-on: windows-latest
    needs: [create_release]
    name: Build Windows x86_64

    steps:
    - uses: actions/checkout@v6

    - name: download VTK
      uses: suisei-cn/actions-download-file@v1.6.1
      with:
        url: https://vtk.org/files/release/${{ inputs.version_major }}.${{ inputs.version_minor }}/VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.tar.gz
        target: ${{github.workspace}}/

    - name: Extract VTK tgz
      run: |
          tar -xvzf VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.tar.gz

    - name: Patch VTK
      run: |
          ls .
          PATCH=./patches/VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.patch
          if [ -f "$PATCH" ]; then
              patch -p0 < $PATCH
          fi
      shell: bash

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
          version: ${{ env.QT_VERSION }}
          arch: "win64_msvc2022_64"
          dir: "${{ github.workspace }}/qt/"
          modules: "qtmultimedia qtcharts"
          install-deps: "true"
          set-env: "true"

    - name: Debug Qt installation
      shell: bash
      run: |
          echo "QT_ROOT_DIR: $QT_ROOT_DIR"
          ls "$QT_ROOT_DIR" && echo "Qt dir OK" || echo "ERROR: QT_ROOT_DIR not accessible"

    - name: Create installation folder
      run: |
          mkdir -p ${{github.workspace}}/install

    - name: BUILD_SHARED_LIBS value
      uses: haya14busa/action-cond@v1
      id: BUILD_SHARED_LIBS
      with:
        cond: ${{ inputs.shared }}
        if_true: -DBUILD_SHARED_LIBS=ON
        if_false: -DBUILD_SHARED_LIBS=OFF

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{env.CMAKE_OPTIONS}} ${{ steps.BUILD_SHARED_LIBS.outputs.value }} -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j ${{inputs.threads}}

    - name: Install
      working-directory: ${{github.workspace}}/build
      run: cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Create tar.gz
      uses: a7ul/tar-action@v1.2.0
      with:
        command: c
        cwd: ${{github.workspace}}/install
        files: ./
        outPath: ${{github.workspace}}/vtk-Windows-x86_64.tar.gz

    - name: Upload tar.gz
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create_release.outputs.upload_url }}
        asset_path: ${{github.workspace}}/vtk-Windows-x86_64.tar.gz
        asset_name: vtk-Windows-x86_64.tar.gz
        asset_content_type: application/zip

  build_ubuntu:
    runs-on: ubuntu-22.04
    needs: [create_release]
    name: Build Ubuntu 22.04 x86_64

    steps:
    - uses: actions/checkout@v6

    - name: download VTK
      uses: suisei-cn/actions-download-file@v1.6.1
      with:
        url: https://vtk.org/files/release/${{ inputs.version_major }}.${{ inputs.version_minor }}/VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.tar.gz
        target: ${{github.workspace}}/

    - name: Extract VTK tgz
      run: |
          tar -xvzf VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.tar.gz

    - name: Patch VTK
      run: |
          ls .
          PATCH=./patches/VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}.patch
          if [ -f "$PATCH" ]; then
              patch -p0 < $PATCH
          fi
      shell: bash

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
          version: ${{ env.QT_VERSION }}
          arch: "linux_gcc_64"
          dir: "${{ github.workspace }}/qt/"
          modules: "qtmultimedia qtcharts"
          install-deps: "true"
          set-env: "true"

    - name: Debug Qt installation
      shell: bash
      run: |
          echo "QT_ROOT_DIR: $QT_ROOT_DIR"
          ls "$QT_ROOT_DIR" && echo "Qt dir OK" || echo "ERROR: QT_ROOT_DIR not accessible"

    - name: Create installation folder
      run: |
          mkdir -p ${{github.workspace}}/install

    - name: BUILD_SHARED_LIBS value
      uses: haya14busa/action-cond@v1
      id: BUILD_SHARED_LIBS
      with:
        cond: ${{ inputs.shared }}
        if_true: -DBUILD_SHARED_LIBS=ON
        if_false: -DBUILD_SHARED_LIBS=OFF

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{env.CMAKE_OPTIONS}} ${{ steps.BUILD_SHARED_LIBS.outputs.value }} -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install VTK-${{ inputs.version_major }}.${{ inputs.version_minor }}.${{ inputs.version_patch }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j ${{inputs.threads}}

    - name: Install
      working-directory: ${{github.workspace}}/build
      run: cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Create tar.gz
      uses: a7ul/tar-action@v1.2.0
      with:
        command: c
        cwd: ${{github.workspace}}/install
        files: ./
        outPath: ${{github.workspace}}/vtk-Linux-x86_64.tar.gz

    - name: Upload tar.gz
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create_release.outputs.upload_url }}
        asset_path: ${{github.workspace}}/vtk-Linux-x86_64.tar.gz
        asset_name: vtk-Linux-x86_64.tar.gz
        asset_content_type: application/zip

 